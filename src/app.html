<!doctype html>
<html lang="ja">
  <head>
    <script data-ga-measurement-id="%sveltekit.env.PUBLIC_GA_MEASUREMENT_ID%">
      const measurementId = document.currentScript?.getAttribute('data-ga-measurement-id') ?? ''
      if (/^G-[A-Z0-9]+$/.test(measurementId)) {
        window.dataLayer = window.dataLayer || []
        function gtag() {
          window.dataLayer.push(arguments)
        }
        gtag('js', new Date())
        gtag('config', measurementId)

        const googleTag = document.createElement('script')
        googleTag.async = true
        googleTag.src = `https://www.googletagmanager.com/gtag/js?id=${encodeURIComponent(measurementId)}`
        document.head.append(googleTag)
      }
    </script>
    <meta charset="UTF-8">
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    >
    <meta name="theme-color" content="#0A1E3C">
    <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="shortcut icon" href="/favicon.ico">
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/icons/apple-touch-icon.png"
    >
    <meta name="apple-mobile-web-app-title" content="Vecta">
    <link rel="manifest" href="/site.webmanifest">
    <link rel="sitemap" href="/sitemap-index.xml">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700&family=Montserrat:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    >
    <link
      rel="preload"
      href="/assets/logo_horizontal.svg"
      as="image"
      type="image/svg+xml"
    >
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
